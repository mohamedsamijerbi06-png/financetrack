<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ledger — Personal Finance Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="financetracker.css"/>
</head>
<body>

<!-- NAV -->
<nav class="app-nav">
  <div class="nav-brand">
    <i class="bi bi-wallet2"></i>
    <span>Ledger</span>
  </div>
  <div class="nav-actions">
    <button class="btn-add income" data-bs-toggle="modal" data-bs-target="#txModal" data-type="income">
      <i class="bi bi-plus-circle"></i> Add Income
    </button>
    <button class="btn-add expense" data-bs-toggle="modal" data-bs-target="#txModal" data-type="expense">
      <i class="bi bi-dash-circle"></i> Add Expense
    </button>
  </div>
</nav>

<div class="container-fluid app-body">

  <!-- BALANCE HERO -->
  <div class="balance-hero">
    <div class="balance-hero-bg"></div>
    <div class="balance-content">
      <p class="balance-label">Total Balance</p>
      <h1 class="balance-amount" id="totalBalance">$0.00</h1>
      <div class="balance-pills">
        <div class="balance-pill income-pill">
          <i class="bi bi-arrow-down-circle-fill"></i>
          <div>
            <div class="pill-label">Income</div>
            <div class="pill-value" id="totalIncome">$0.00</div>
          </div>
        </div>
        <div class="balance-divider"></div>
        <div class="balance-pill expense-pill">
          <i class="bi bi-arrow-up-circle-fill"></i>
          <div>
            <div class="pill-label">Expenses</div>
            <div class="pill-value" id="totalExpenses">$0.00</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="row g-4 mt-2">

    <!-- LEFT: Charts & Stats -->
    <div class="col-lg-8">

      <!-- Monthly Overview Chart -->
      <div class="card-panel mb-4">
        <div class="panel-header">
          <h3>Monthly Overview</h3>
          <select id="yearSelect" class="year-select"></select>
        </div>
        <canvas id="monthlyChart" height="120"></canvas>
      </div>

      <!-- Category Breakdown -->
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div class="card-panel">
            <div class="panel-header"><h3>Expenses by Category</h3></div>
            <canvas id="expCategoryChart" height="220"></canvas>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card-panel">
            <div class="panel-header"><h3>Income Sources</h3></div>
            <canvas id="incCategoryChart" height="220"></canvas>
          </div>
        </div>
      </div>

      <!-- Transactions Table -->
      <div class="card-panel">
        <div class="panel-header">
          <h3>Transactions</h3>
          <div class="filter-group">
            <select id="filterMonth" class="year-select"></select>
            <select id="filterType" class="year-select">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
        </div>

        <!-- Category Filter Chips -->
        <div class="chip-group" id="categoryChips"></div>

        <div class="tx-table-wrapper">
          <table class="tx-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th class="text-end">Amount</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="txTableBody"></tbody>
          </table>
          <div id="txEmpty" class="empty-state" style="display:none">
            <i class="bi bi-receipt"></i>
            <p>No transactions found</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Budget & Quick Stats -->
    <div class="col-lg-4">

      <!-- Savings Rate -->
      <div class="card-panel mb-4">
        <div class="panel-header"><h3>Savings Rate</h3></div>
        <div class="savings-ring-wrap">
          <canvas id="savingsGauge" height="200"></canvas>
          <div class="savings-center">
            <span id="savingsRate">0%</span>
            <small>saved</small>
          </div>
        </div>
        <div class="savings-tip" id="savingsTip"></div>
      </div>

      <!-- Budget Goals -->
      <div class="card-panel mb-4">
        <div class="panel-header">
          <h3>Budget Goals</h3>
          <button class="icon-btn" id="addBudgetBtn" title="Add budget"><i class="bi bi-plus"></i></button>
        </div>
        <div id="budgetList"></div>
      </div>

      <!-- Top Expenses -->
      <div class="card-panel">
        <div class="panel-header"><h3>Top Expense Categories</h3></div>
        <div id="topExpenses"></div>
      </div>

    </div>
  </div>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content ledger-modal">
      <div class="modal-head">
        <h5 id="txModalTitle">Add Transaction</h5>
        <button type="button" class="modal-close" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="p-4">
        <input type="hidden" id="txEditId"/>
        <div class="tx-type-toggle mb-4">
          <button class="type-btn income active" id="typeIncome" data-type="income">
            <i class="bi bi-arrow-down-circle-fill"></i> Income
          </button>
          <button class="type-btn expense" id="typeExpense" data-type="expense">
            <i class="bi bi-arrow-up-circle-fill"></i> Expense
          </button>
        </div>
        <div class="mb-3">
          <label class="field-label">Description *</label>
          <input type="text" id="txDesc" class="field-input" placeholder="e.g. Salary, Netflix subscription..."/>
        </div>
        <div class="mb-3">
          <label class="field-label">Amount (USD) *</label>
          <div class="amount-input-wrap">
            <span class="amount-prefix">$</span>
            <input type="number" id="txAmount" class="field-input amount-input" placeholder="0.00" min="0" step="0.01"/>
          </div>
        </div>
        <div class="mb-3">
          <label class="field-label">Category</label>
          <select id="txCategory" class="field-input">
            <option value="">Select category</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="field-label">Date *</label>
          <input type="date" id="txDate" class="field-input"/>
        </div>
        <div class="mb-4">
          <label class="field-label">Note</label>
          <textarea id="txNote" class="field-input" rows="2" placeholder="Optional note..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-save" id="saveTxBtn">Save Transaction</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD BUDGET MODAL -->
<div class="modal fade" id="budgetModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content ledger-modal">
      <div class="modal-head">
        <h5>Set Budget Goal</h5>
        <button class="modal-close" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="p-4">
        <div class="mb-3">
          <label class="field-label">Category</label>
          <select id="budgetCategory" class="field-input"></select>
        </div>
        <div class="mb-4">
          <label class="field-label">Monthly Limit ($)</label>
          <input type="number" id="budgetLimit" class="field-input" placeholder="500" min="1"/>
        </div>
        <button class="btn-save w-100" id="saveBudgetBtn">Save Budget</button>
      </div>
    </div>
  </div>
</div>

<div id="toastArea"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="financetracker.js"></script>
</body>
</html>
